name: 📊 GitHub Metrics

on:
  schedule:
    - cron: "0 16 * * *"   # 23:00 WIB (UTC+7)
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: 🔍 Check GitHub activity in last 24 hours
        id: activity
        run: |
          USER="tedgigradar"
          SINCE=$(date -u -d "24 hours ago" +"%Y-%m-%dT%H:%M:%SZ")

          COUNT=$(curl -s https://api.github.com/users/$USER/events \
            | jq --arg SINCE "$SINCE" '[.[] | select(.created_at > $SINCE)] | length')

          echo "Events in last 24h: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "No recent activity — skipping metrics update."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Activity detected — updating metrics."
          fi

      - name: 📊 Generate GitHub Stats Card
        if: steps.activity.outputs.skip != 'true'
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/stats.svg
          base: header, repositories
          plugin_lines: yes
          config_display: columns
          output_action: commit

      - name: 🗂️ Generate Top Languages
        if: steps.activity.outputs.skip != 'true'
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          output_action: commit
